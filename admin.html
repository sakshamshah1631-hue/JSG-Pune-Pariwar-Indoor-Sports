<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - JSG Pune</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="login-section" class="admin-box">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="dashboard-section" style="display:none;" class="dashboard-box">
        <h2>Registrations</h2>
        <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem;">
            <button id="logoutBtn">Logout</button>
            <button id="exportBtn" style="background: linear-gradient(135deg, #1E3A8A, #2563EB); color: white; padding: 12px 30px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: all 0.3s ease; box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3);">📥 Export to Excel</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>JSG Group</th>
                </tr>
            </thead>
            <tbody id="registrationTableBody"></tbody>
        </table>
    </div>
    <script src="/admin-script.js"></script>
</body>
</html>
