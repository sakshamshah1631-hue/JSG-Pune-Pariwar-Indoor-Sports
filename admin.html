<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - JSG Pune Pariwar Tournament</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- Login Form -->
        <div id="loginSection" class="admin-login">
            <div class="login-card">
                <div class="logo-admin">
                    <img src="logo-placeholder.png" alt="JSG Pune Pariwar">
                </div>
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" class="admin-dashboard" style="display: none;">
            <header class="admin-header">
                <div class="logo-admin">
                    <img src="logo-placeholder.png" alt="JSG Pune Pariwar">
                    <span>Admin Dashboard</span>
                </div>
                <button id="logoutBtn" class="btn btn-outline">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </header>

            <div class="dashboard-content">
                <div class="stats-card">
                    <h3>Total Registrations</h3>
                    <div class="stat-number" id="totalRegistrations">0</div>
                </div>
                
                <div class="action-buttons">
                    <a href="/api/admin/export" class="btn btn-primary btn-large" id="exportBtn">
                        <i class="fas fa-download"></i> Export to Excel
                    </a>
                </div>

                <div class="registrations-table">
                    <h3>Recent Registrations</h3>
                    <div class="table-container">
                        <table id="registrationsTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Mobile</th>
                                    <th>Age</th>
                                    <th>JSG Group</th>
                                    <th>12th July Sports</th>
                                    <th>19th July Sports</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
