<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - JSG Pune</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="login-section" class="admin-box">
        <div class="admin-card glass-card animate-scale">
            <div class="admin-card__header">
                <span class="admin-badge">Secure Access</span>
                <h2>Admin Login</h2>
                <p class="admin-subtitle">Access registrations, export data, and review member activity.</p>
            </div>

            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="dashboard-box" style="display:none;">
        <div class="dashboard-panel glass-card animate-scale">
            <div class="dashboard-top">
                <div>
                    <h2>Admin Dashboard</h2>
                    <p class="dashboard-note">Live view of current registrations and export tools.</p>
                </div>
                <div class="dashboard-actions">
                    <button id="logoutBtn">Logout</button>
                    <button id="exportBtn">🗄️ Backup Excel</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span>Total</span>
                    <strong id="totalCount">0</strong>
                    <small>registrations</small>
                </div>
                <div class="stat-card">
                    <span>Updated</span>
                    <strong id="lastUpdated">—</strong>
                    <small>refresh time</small>
                </div>
                <div class="stat-card">
                    <span>Male</span>
                    <strong id="maleCount">0</strong>
                    <small>registrations</small>
                </div>
                <div class="stat-card">
                    <span>Female</span>
                    <strong id="femaleCount">0</strong>
                    <small>registrations</small>
                </div>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <input id="searchInput" type="search" placeholder="Search registrations by name, mobile, gender, group or sport">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Gender</th>
                            <th>Group</th>
                            <th>Mobile</th>
                            <th>Sports & Category</th>
                        </tr>
                    </thead>
                    <tbody id="registrationTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/admin-script.js"></script>
</body>
</html>
